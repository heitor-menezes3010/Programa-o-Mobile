<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora no Console</title>
</head>
<body>

    <h3>Calculadora (Resultado no Console)</h3>
    <p>Abra o Console (F12) para ver o resultado.</p>
    
    <input type="number" id="num1" placeholder="Número 1">
    <input type="number" id="num2" placeholder="Número 2">
    <br><br>

    <button onclick="calcular('somar')">Somar</button>
    <button onclick="calcular('subtrair')">Subtrair</button>
    <button onclick="calcular('multiplicar')">Multiplicar</button>
    <button onclick="calcular('dividir')">Dividir</button>

    <p id="Resultado"></p>
    
    <script src="script.js"></script>
</body>
</html>
